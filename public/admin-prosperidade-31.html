<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosperidade 31 — Do Fracasso ao Legado (ADM)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0d0d10; color: #e8e8e8; min-height: 100vh; padding: 20px; line-height: 1.5; }
        .wrap { max-width: 1100px; margin: 0 auto; }
        h1 { font-size: 1.35rem; color: #FFC700; margin-bottom: 6px; }
        .sub { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        .card { background: rgba(22,22,28,0.95); border: 1px solid rgba(255,199,0,0.18); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
        .card h2 { font-size: 1rem; color: #FFC700; margin-bottom: 12px; }
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 10px; font-weight: 600; font-size: 0.88rem; border: none; cursor: pointer; background: #FFC700; color: #111; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #e8e8e8; border: 1px solid rgba(255,255,255,0.15); }
        .btn-sm { padding: 6px 10px; font-size: 0.78rem; }
        .grid-31 { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .act-card { padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; background: rgba(0,0,0,0.25); }
        .act-card:hover { border-color: rgba(255,199,0,0.4); }
        .act-card.selected { border-color: #FFC700; background: rgba(255,199,0,0.08); }
        .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 6px; display: inline-block; margin-top: 6px; }
        .badge-vazio { background: rgba(120,120,120,0.3); color: #aaa; }
        .badge-rascunho { background: rgba(59,130,246,0.2); color: #93c5fd; }
        .badge-publicado { background: rgba(34,197,94,0.2); color: #86efac; }
        .badge-incompleto { background: rgba(234,179,8,0.2); color: #fde047; }
        label { font-size: 0.78rem; color: #888; display: block; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.35); color: #e8e8e8; font-size: 0.88rem; font-family: inherit; }
        textarea { min-height: 80px; resize: vertical; }
        .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-bottom: 12px; }
        .tabs-ed { display: flex; gap: 8px; margin-bottom: 14px; }
        .tabs-ed button { padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: #ccc; cursor: pointer; }
        .tabs-ed button.active { border-color: #FFC700; color: #FFC700; }
        .panel-ed { display: none; }
        .panel-ed.active { display: block; }
        .msg { padding: 10px 14px; border-radius: 10px; margin-bottom: 14px; font-size: 0.88rem; }
        .msg-ok { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.35); color: #86efac; }
        .msg-err { background: rgba(220,60,60,0.15); border: 1px solid rgba(220,60,60,0.4); color: #f5a097; }
        .field { margin-bottom: 12px; }
        .cheatsheet { font-size: 0.85rem; color: #aaa; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 12px; }
        #editor-panel { display: none; }
        .progress-wrap { margin-top: 10px; background: rgba(0,0,0,0.35); border-radius: 8px; height: 8px; overflow: hidden; }
        .progress-bar { height: 100%; background: #FFC700; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>
<div class="wrap">
    <h1><i class="fas fa-moon"></i> Prosperidade 31 — Do Fracasso ao Legado</h1>
    <p class="sub">Admin separado do Devocional 365. Cadastre as 31 Ativações (colar ou IA), preview e publicar.</p>
    <div id="flash"></div>
    <div class="card">
        <div class="row">
            <label style="flex:1">Token admin <input type="password" id="token-manual" placeholder="Bearer token"></label>
            <label style="flex:1">URL API <input type="text" id="api-base-url" placeholder="https://conectaking-api.onrender.com"></label>
            <button type="button" class="btn btn-secondary" id="btn-save-auth"><i class="fas fa-save"></i> Guardar</button>
        </div>
    </div>
    <div class="card">
        <h2><i class="fas fa-th"></i> Grid 31 Ativações</h2>
        <div class="row">
            <button type="button" class="btn btn-secondary" id="btn-reload-grid"><i class="fas fa-sync"></i> Recarregar</button>
            <button type="button" class="btn btn-secondary" id="btn-export"><i class="fas fa-download"></i> Exportar JSON</button>
            <label class="btn btn-secondary" style="cursor:pointer"><i class="fas fa-upload"></i> Importar JSON<input type="file" id="import-file" accept=".json" style="display:none"></label>
        </div>
        <div class="row" style="margin-top:12px">
            <label>Lote IA início <input type="number" id="batch-start" min="1" max="31" value="1" style="width:70px"></label>
            <label>fim <input type="number" id="batch-end" min="1" max="31" value="7" style="width:70px"></label>
            <label>delay ms <input type="number" id="batch-delay" value="800" style="width:80px"></label>
            <button type="button" class="btn" id="btn-batch-async"><i class="fas fa-robot"></i> Gerar lote (async)</button>
        </div>
        <div id="batch-status" style="font-size:0.82rem;color:#aaa;margin-top:8px"></div>
        <div class="progress-wrap" id="batch-progress-wrap" style="display:none"><div class="progress-bar" id="batch-progress-bar"></div></div>
        <div class="grid-31" id="grid-31" style="margin-top:16px"></div>
    </div>
    <div class="card" id="editor-panel">
        <h2>Ativação <span id="ed-num">1</span> — <span id="ed-status"></span></h2>
        <div class="cheatsheet" id="cheatsheet"></div>
        <div class="tabs-ed">
            <button type="button" class="active" data-ed="colar">Colar por escrito</button>
            <button type="button" data-ed="ia">Gerar com IA</button>
            <button type="button" data-ed="campos">Campos</button>
            <button type="button" data-ed="preview">Preview</button>
        </div>
        <div id="panel-colar" class="panel-ed active">
            <div class="field"><label>Ativação completa</label><textarea id="paste-full" rows="12" placeholder="Cole texto com títulos DECRETO DE ENTRADA, FUNDAMENTO SAGRADO..."></textarea></div>
            <button type="button" class="btn btn-secondary" id="btn-parse"><i class="fas fa-cut"></i> Dividir seções</button>
        </div>
        <div id="panel-ia" class="panel-ed">
            <button type="button" class="btn" id="btn-gen-one"><i class="fas fa-magic"></i> Gerar esta Ativação</button>
            <p id="gen-status" style="margin-top:10px;font-size:0.85rem;color:#aaa"></p>
        </div>
        <div id="panel-campos" class="panel-ed">
            <div class="field"><label>Título</label><input id="f-titulo"></div>
            <div class="field"><label>Decreto de entrada</label><textarea id="f-decreto"></textarea></div>
            <div class="field"><label>Fundamento sagrado</label><textarea id="f-fundamento" rows="5"></textarea></div>
            <div class="field"><label>Diagnóstico da escassez</label><textarea id="f-diagnostico"></textarea></div>
            <div class="field"><label>Na estrada com o KING</label><textarea id="f-estrada" rows="4"></textarea></div>
            <div class="field"><label>Diretriz de ilustração</label><textarea id="f-ilustracao"></textarea></div>
            <div class="field"><label>Mentalidade travada</label><textarea id="f-travada"></textarea></div>
            <div class="field"><label>Nova mentalidade</label><textarea id="f-nova"></textarea></div>
            <div class="field"><label>Exercício de fixação</label><textarea id="f-exercicio"></textarea></div>
            <div class="field"><label>IE chave</label><textarea id="f-ie"></textarea></div>
            <div class="field"><label>Treino negócios</label><textarea id="f-negocios"></textarea></div>
            <div class="field"><label>Treino altar</label><textarea id="f-altar"></textarea></div>
            <div class="field"><label>Sentença de ativação</label><textarea id="f-sentenca"></textarea></div>
            <div class="field"><label>Próximo episódio</label><textarea id="f-proximo"></textarea></div>
        </div>
        <div id="panel-preview" class="panel-ed"><div id="preview-host" style="font-size:0.9rem;color:#ccc"></div></div>
        <div class="row" style="margin-top:16px">
            <button type="button" class="btn btn-secondary" id="btn-save"><i class="fas fa-save"></i> Salvar rascunho</button>
            <button type="button" class="btn" id="btn-publish"><i class="fas fa-check"></i> Publicar</button>
            <button type="button" class="btn btn-secondary" id="btn-unpublish"><i class="fas fa-eye-slash"></i> Despublicar</button>
        </div>
    </div>
</div>
<script>
(function() {
    var LS_TOKEN = 'prosperidade_admin_token';
    var LS_API = 'prosperidade_admin_api';
    var LS_JOB = 'prosperidade_bg_job';
    var currentN = null;
    var pollTimer = null;

    function flash(msg, ok) {
        var el = document.getElementById('flash');
        el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(function() { el.style.display = 'none'; }, 6000);
    }

    function getToken() {
        return localStorage.getItem(LS_TOKEN) || document.getElementById('token-manual').value.trim();
    }
    function apiBase() {
        var v = localStorage.getItem(LS_API) || document.getElementById('api-base-url').value.trim();
        return v.replace(/\/$/, '');
    }
    function apiUrl(path) {
        var base = apiBase();
        return (base || '') + '/api/admin' + path;
    }
    async function apiFetch(path, opts) {
        opts = opts || {};
        var headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
        var t = getToken();
        if (t) headers.Authorization = 'Bearer ' + t;
        var res = await fetch(apiUrl(path), Object.assign({}, opts, { headers: headers }));
        var json = await res.json().catch(function() { return {}; });
        if (!res.ok) throw new Error(json.message || res.statusText);
        return json;
    }

    document.getElementById('btn-save-auth').onclick = function() {
        localStorage.setItem(LS_TOKEN, document.getElementById('token-manual').value.trim());
        localStorage.setItem(LS_API, document.getElementById('api-base-url').value.trim());
        flash('Auth guardado.', true);
    };
    if (localStorage.getItem(LS_TOKEN)) document.getElementById('token-manual').value = localStorage.getItem(LS_TOKEN);
    if (localStorage.getItem(LS_API)) document.getElementById('api-base-url').value = localStorage.getItem(LS_API);

    function badgeClass(s) {
        return 'badge badge-' + (s || 'vazio');
    }

    async function loadGrid() {
        var json = await apiFetch('/bible/prosperidade');
        var list = (json.data && json.data.activations) || [];
        var host = document.getElementById('grid-31');
        host.innerHTML = list.map(function(a) {
            return '<div class="act-card" data-n="' + a.activation_number + '"><strong>Ativação ' + a.activation_number + '</strong><div style="font-size:0.78rem;color:#888;margin-top:4px">' + (a.titulo || '').substring(0, 40) + '</div><span class="' + badgeClass(a.status) + '">' + a.status + '</span></div>';
        }).join('');
        host.querySelectorAll('.act-card').forEach(function(c) {
            c.onclick = function() { openEditor(parseInt(c.dataset.n, 10)); };
        });
    }

    function fieldsFromForm() {
        return {
            titulo: document.getElementById('f-titulo').value,
            decreto_entrada: document.getElementById('f-decreto').value,
            fundamento_sagrado: document.getElementById('f-fundamento').value,
            diagnostico_escassez: document.getElementById('f-diagnostico').value,
            estrada_com_king: document.getElementById('f-estrada').value,
            diretriz_ilustracao: document.getElementById('f-ilustracao').value,
            mentalidade_travada: document.getElementById('f-travada').value,
            nova_mentalidade: document.getElementById('f-nova').value,
            exercicio_fixacao: document.getElementById('f-exercicio').value,
            ie_chave: document.getElementById('f-ie').value,
            treino_negocios: document.getElementById('f-negocios').value,
            treino_altar: document.getElementById('f-altar').value,
            sentenca_ativacao: document.getElementById('f-sentenca').value,
            proximo_episodio: document.getElementById('f-proximo').value,
            content_source: 'manual'
        };
    }

    function fillForm(d) {
        document.getElementById('f-titulo').value = d.titulo || '';
        document.getElementById('f-decreto').value = d.decreto_entrada || '';
        document.getElementById('f-fundamento').value = d.fundamento_sagrado || '';
        document.getElementById('f-diagnostico').value = d.diagnostico_escassez || '';
        document.getElementById('f-estrada').value = d.estrada_com_king || '';
        document.getElementById('f-ilustracao').value = d.diretriz_ilustracao || '';
        document.getElementById('f-travada').value = d.mentalidade_travada || '';
        document.getElementById('f-nova').value = d.nova_mentalidade || '';
        document.getElementById('f-exercicio').value = d.exercicio_fixacao || '';
        document.getElementById('f-ie').value = d.ie_chave || '';
        document.getElementById('f-negocios').value = d.treino_negocios || '';
        document.getElementById('f-altar').value = d.treino_altar || '';
        document.getElementById('f-sentenca').value = d.sentenca_ativacao || '';
        document.getElementById('f-proximo').value = d.proximo_episodio || '';
    }

    async function openEditor(n) {
        currentN = n;
        document.getElementById('editor-panel').style.display = 'block';
        document.getElementById('ed-num').textContent = n;
        document.querySelectorAll('.act-card').forEach(function(c) {
            c.classList.toggle('selected', parseInt(c.dataset.n, 10) === n);
        });
        var json = await apiFetch('/bible/prosperidade/' + n);
        var d = json.data || {};
        document.getElementById('ed-status').textContent = d.status || '';
        var st = d.storytelling || {};
        document.getElementById('cheatsheet').innerHTML = '<strong>Fase ' + n + ':</strong> ' + (st.titulo || '') + ' — ' + (st.resumo || '');
        fillForm(d);
        renderPreview(d);
    }

    function renderPreview(d) {
        var h = '<h3 style="color:#FFC700">' + (d.titulo || '') + '</h3>';
        ['decreto_entrada','fundamento_sagrado','diagnostico_escassez','estrada_com_king','diretriz_ilustracao','sentenca_ativacao','proximo_episodio'].forEach(function(k) {
            if (d[k]) h += '<p><strong>' + k + '</strong><br>' + String(d[k]).replace(/\n/g, '<br>') + '</p>';
        });
        document.getElementById('preview-host').innerHTML = h;
    }

    document.querySelectorAll('.tabs-ed button').forEach(function(btn) {
        btn.onclick = function() {
            document.querySelectorAll('.tabs-ed button').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.panel-ed').forEach(function(p) { p.classList.remove('active'); });
            btn.classList.add('active');
            document.getElementById('panel-' + btn.dataset.ed).classList.add('active');
            if (btn.dataset.ed === 'preview') renderPreview(fieldsFromForm());
        };
    });

    document.getElementById('btn-parse').onclick = async function() {
        if (!currentN) return;
        try {
            var json = await apiFetch('/bible/prosperidade/' + currentN + '/parse-paste', {
                method: 'POST',
                body: JSON.stringify({ text: document.getElementById('paste-full').value })
            });
            var s = (json.data && json.data.sections) || {};
            fillForm(Object.assign({ content_source: 'manual' }, s));
            flash('Seções divididas — revise nos Campos.', true);
            document.querySelector('.tabs-ed button[data-ed="campos"]').click();
        } catch (e) { flash(e.message, false); }
    };

    document.getElementById('btn-gen-one').onclick = async function() {
        if (!currentN) return;
        var st = document.getElementById('gen-status');
        st.textContent = 'Gerando...';
        try {
            var json = await apiFetch('/bible/prosperidade/' + currentN + '/generate-ai', { method: 'POST', body: '{}' });
            fillForm(Object.assign({}, json.data, { content_source: 'ai' }));
            st.textContent = 'Tokens: ' + ((json.tokens && json.tokens.total) || '?');
            flash('IA concluída — revise e salve.', true);
            document.querySelector('.tabs-ed button[data-ed="campos"]').click();
        } catch (e) { st.textContent = e.message; flash(e.message, false); }
    };

    document.getElementById('btn-save').onclick = async function() {
        if (!currentN) return;
        try {
            await apiFetch('/bible/prosperidade/' + currentN, { method: 'PUT', body: JSON.stringify(fieldsFromForm()) });
            flash('Rascunho salvo.', true);
            loadGrid();
        } catch (e) { flash(e.message, false); }
    };

    document.getElementById('btn-publish').onclick = async function() {
        if (!currentN) return;
        try {
            await apiFetch('/bible/prosperidade/' + currentN, { method: 'PUT', body: JSON.stringify(fieldsFromForm()) });
            await apiFetch('/bible/prosperidade/' + currentN + '/publish', { method: 'PATCH', body: JSON.stringify({ published: true }) });
            flash('Publicado!', true);
            loadGrid();
            openEditor(currentN);
        } catch (e) { flash(e.message, false); }
    };

    document.getElementById('btn-unpublish').onclick = async function() {
        if (!currentN) return;
        try {
            await apiFetch('/bible/prosperidade/' + currentN + '/publish', { method: 'PATCH', body: JSON.stringify({ published: false }) });
            flash('Despublicado.', true);
            loadGrid();
        } catch (e) { flash(e.message, false); }
    };

    document.getElementById('btn-reload-grid').onclick = function() { loadGrid().catch(function(e) { flash(e.message, false); }); };

    document.getElementById('btn-export').onclick = async function() {
        try {
            var json = await apiFetch('/bible/prosperidade/export');
            var blob = new Blob([JSON.stringify(json.data, null, 2)], { type: 'application/json' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'prosperidade-31-backup.json';
            a.click();
        } catch (e) { flash(e.message, false); }
    };

    document.getElementById('import-file').onchange = async function(ev) {
        var f = ev.target.files[0];
        if (!f) return;
        try {
            var text = await f.text();
            var data = JSON.parse(text);
            var items = data.activations || data;
            await apiFetch('/bible/prosperidade/import', { method: 'POST', body: JSON.stringify({ activations: items }) });
            flash('Importação concluída.', true);
            loadGrid();
        } catch (e) { flash(e.message, false); }
        ev.target.value = '';
    };

    function pollJob(jobId) {
        if (pollTimer) clearInterval(pollTimer);
        document.getElementById('batch-progress-wrap').style.display = 'block';
        pollTimer = setInterval(async function() {
            try {
                var json = await apiFetch('/bible/prosperidade/generation-job/' + jobId);
                var j = json.data || {};
                var pct = j.total ? Math.round((j.done / j.total) * 100) : 0;
                document.getElementById('batch-progress-bar').style.width = pct + '%';
                document.getElementById('batch-status').textContent = 'Job ' + j.status + ' — ' + j.done + '/' + j.total + ' (tokens: ' + (j.tokensTotal || 0) + ')';
                if (j.status === 'done' || j.status === 'partial' || j.status === 'failed' || j.status === 'cancelled') {
                    clearInterval(pollTimer);
                    localStorage.removeItem(LS_JOB);
                    loadGrid();
                }
            } catch (e) {}
        }, 2500);
    }

    document.getElementById('btn-batch-async').onclick = async function() {
        var start = parseInt(document.getElementById('batch-start').value, 10);
        var end = parseInt(document.getElementById('batch-end').value, 10);
        if (end - start + 1 > 15) { flash('Máximo 15 por lote.', false); return; }
        if (!confirm('Gerar Ativações ' + start + ' a ' + end + ' com IA? Revise antes de publicar.')) return;
        try {
            var json = await apiFetch('/bible/prosperidade/generate-range-ai', {
                method: 'POST',
                body: JSON.stringify({ start: start, end: end, async: true, delayMs: parseInt(document.getElementById('batch-delay').value, 10) || 800 })
            });
            var jobId = json.data && json.data.jobId;
            if (jobId) { localStorage.setItem(LS_JOB, jobId); pollJob(jobId); flash('Lote iniciado.', true); }
        } catch (e) { flash(e.message, false); }
    };

    var savedJob = localStorage.getItem(LS_JOB);
    if (savedJob) pollJob(savedJob);
    loadGrid().catch(function(e) { flash('Carregue token e URL da API. ' + e.message, false); });
})();
</script>
</body>
</html>
