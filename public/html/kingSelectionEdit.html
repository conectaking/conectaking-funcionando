<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KingSelection - Painel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --ks-bg: #0f0f12;
      --ks-card: rgba(24, 24, 28, 0.95);
      --ks-border: rgba(255,255,255,0.1);
      --ks-primary: #facc15;
      --ks-text: #f4f4f5;
      --ks-muted: #a1a1aa;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--ks-bg); color: var(--ks-text); font-family: 'Inter', system-ui, sans-serif; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--ks-border);
      flex-wrap: wrap;
    }
    .logo { font-weight: 800; font-size: 1.1rem; color: var(--ks-text); }
    .logo-sub { font-size: 0.75rem; color: var(--ks-muted); font-weight: 500; margin-top: 2px; }
    .search-wrap { flex: 1; max-width: 400px; }
    .search-wrap input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--ks-border);
      border-radius: 10px;
      background: var(--ks-card);
      color: var(--ks-text);
      font-size: 0.9rem;
    }
    .search-wrap input::placeholder { color: var(--ks-muted); }
    .btns { display: flex; gap: 10px; align-items: center; }
    .btn {
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-secondary { background: rgba(255,255,255,0.08); color: var(--ks-text); }
    .btn-primary { background: var(--ks-primary); color: #0a0a0a; }
    .btn-primary:hover { filter: brightness(1.05); }
    .kanban {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 24px;
      min-height: 60vh;
    }
    @media (max-width: 900px) { .kanban { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 500px) { .kanban { grid-template-columns: 1fr; } }
    .col {
      background: var(--ks-card);
      border: 1px solid var(--ks-border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }
    .col-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 12px; color: var(--ks-text); }
    .col-count { color: var(--ks-muted); font-weight: 500; font-size: 0.85rem; margin-left: 6px; }
    .col-cards { flex: 1; display: flex; flex-direction: column; gap: 12px; min-height: 80px; }
    .card {
      background: rgba(18,18,22,0.8);
      border: 1px solid var(--ks-border);
      border-radius: 12px;
      padding: 14px;
      position: relative;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--ks-primary); }
    .card-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
    .card-meta { font-size: 0.75rem; color: var(--ks-muted); font-family: ui-monospace, monospace; }
    .card-stats { font-size: 0.8rem; color: var(--ks-muted); margin-top: 8px; }
    .card-trash {
      position: absolute;
      top: 10px;
      right: 10px;
      color: #ef4444;
      cursor: pointer;
      padding: 4px;
      opacity: 0.7;
    }
    .card-trash:hover { opacity: 1; }
    .empty-msg { font-size: 0.85rem; color: var(--ks-muted); padding: 12px 0; }
    .err-msg { padding: 16px; background: rgba(239,68,68,0.15); border-radius: 12px; color: #fca5a5; margin: 24px; }
    .ks-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.72);
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }
    .ks-modal-overlay.open { display: flex; }
    .ks-modal {
      width: 100%;
      max-width: 520px;
      background: var(--ks-card);
      border: 1px solid var(--ks-border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.55);
    }
    .ks-modal h2 {
      margin: 0 0 20px;
      font-size: 1.25rem;
      font-weight: 800;
    }
    .ks-field { margin-bottom: 16px; }
    .ks-field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ks-muted);
      margin-bottom: 6px;
    }
    .ks-field input, .ks-field select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--ks-border);
      background: rgba(18,18,22,0.9);
      color: var(--ks-text);
      font-size: 0.9rem;
    }
    .ks-field input:focus, .ks-field select:focus {
      outline: none;
      border-color: rgba(250, 204, 21, 0.45);
    }
    .ks-row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 520px) { .ks-row2 { grid-template-columns: 1fr; } }
    .ks-hint-small {
      font-size: 0.75rem;
      color: var(--ks-muted);
      margin-top: 6px;
      line-height: 1.4;
    }
    .ks-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .ks-check {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      color: var(--ks-text);
    }
    .ks-check input { width: auto; }
    .ks-data-readonly {
      font-size: 0.85rem;
      color: var(--ks-muted);
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px dashed var(--ks-border);
      background: rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">KingSelection <div class="logo-sub">WORKSPACE - GALERIAS</div></div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Procurar projeto, cliente ou slug..." autocomplete="off" />
    </div>
    <div class="btns">
      <a href="#" id="btnVoltar" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> VOLTAR</a>
      <a href="#" id="btnNova" class="btn btn-primary"><i class="fas fa-plus"></i> NOVA GALERIA</a>
    </div>
  </div>
  <div id="errMsg" class="err-msg" style="display:none;"></div>
  <div class="kanban" id="kanban"></div>

  <div id="modalNova" class="ks-modal-overlay" aria-hidden="true">
    <div class="ks-modal" role="dialog" aria-labelledby="modalNovaTitulo">
      <h2 id="modalNovaTitulo">Nova galeria</h2>
      <form id="formNovaGaleria">
        <div class="ks-field">
          <label for="ng_nome_projeto">Nome do projeto</label>
          <input id="ng_nome_projeto" name="nome_projeto" required autocomplete="off" placeholder="Ex.: Casamento Ana e Bruno" />
        </div>
        <div class="ks-field">
          <label for="ng_categoria">Categoria</label>
          <input id="ng_categoria" name="categoria" autocomplete="off" placeholder="Ex.: Casamento, Evento corporativo…" />
        </div>
        <div class="ks-field">
          <label for="ng_cliente_nome">Nome do cliente / contato</label>
          <input id="ng_cliente_nome" name="cliente_nome" autocomplete="name" placeholder="Nome da pessoa" />
        </div>
        <div class="ks-field">
          <label>Data do trabalho</label>
          <div id="ng_data_trabalho" class="ks-data-readonly"></div>
          <p class="ks-hint-small">Preenchida automaticamente com a data de hoje ao criar.</p>
        </div>
        <div class="ks-field">
          <label for="ng_access_type">Tipo de acesso</label>
          <select id="ng_access_type" name="access_type">
            <option value="private">Privado (e-mail e senha do cliente)</option>
            <option value="signup">Visitante pode se cadastrar</option>
            <option value="public">Público (sem login)</option>
          </select>
          <p class="ks-hint-small" id="ng_access_hint"></p>
        </div>
        <div class="ks-row2" id="ng_cred_wrap">
          <div class="ks-field">
            <label for="ng_cliente_email">E-mail do cliente</label>
            <input id="ng_cliente_email" type="email" name="cliente_email" autocomplete="email" placeholder="cliente@email.com" />
          </div>
          <div class="ks-field">
            <label for="ng_senha">Senha do cliente</label>
            <input id="ng_senha" type="password" name="senha" autocomplete="new-password" placeholder="Crie uma senha" />
          </div>
        </div>
        <div class="ks-row2">
          <div class="ks-field">
            <label for="ng_limite">Limite de seleção (0 = livre)</label>
            <input id="ng_limite" type="number" name="total_fotos_contratadas" min="0" value="0" />
          </div>
          <div class="ks-field">
            <label for="ng_min_sel">Seleção mínima (0 = livre)</label>
            <input id="ng_min_sel" type="number" name="min_selections" min="0" value="0" />
          </div>
        </div>
        <p class="ks-hint-small" style="margin-top:-8px;margin-bottom:12px;">Se o mínimo ainda não existir no banco, o sistema trata como livre.</p>
        <div class="ks-field">
          <label class="ks-check">
            <input type="checkbox" id="ng_watermark" name="use_watermark" checked />
            Aplicar marca d’água nas fotos desta galeria
          </label>
        </div>
        <div class="ks-modal-actions">
          <button type="button" class="btn btn-secondary" id="ng_cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Criar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function() {
      // Rótulos dos status (Andamento → Cliente selecionando, Revisão → Edição)
      var STATUS_LABELS = {
        preparacao: 'Preparação',
        andamento: 'Cliente selecionando',
        revisao: 'Edição',
        finalizado: 'Finalizado'
      };
      var STATUS_ORDER = ['preparacao', 'andamento', 'revisao', 'finalizado'];

      var params = new URLSearchParams(window.location.search);
      var profileItemId = params.get('itemid') || params.get('profileItemId');
      var apiBase = (function() {
        var origin = window.location.origin;
        if (window.location.port === '5500' || window.location.port === '3000') origin = origin.replace(/:\d+$/, ':3000');
        return origin + '/api/king-selection';
      })();
      var token = params.get('token') || (typeof localStorage !== 'undefined' && (localStorage.getItem('conectaKingToken') || localStorage.getItem('conectaking_token') || localStorage.getItem('token') || localStorage.getItem('jwt')));

      function authHeaders() {
        var h = { 'Accept': 'application/json' };
        if (token) h['Authorization'] = 'Bearer ' + token;
        return h;
      }

      function showErr(msg) {
        var el = document.getElementById('errMsg');
        el.textContent = msg;
        el.style.display = msg ? 'block' : 'none';
      }

      function filterGalleries(galleries, query) {
        if (!query || !query.trim()) return galleries;
        var q = query.trim().toLowerCase();
        return galleries.filter(function(g) {
          return (g.nome_projeto && g.nome_projeto.toLowerCase().indexOf(q) >= 0) ||
                 (g.slug && g.slug.toLowerCase().indexOf(q) >= 0) ||
                 (g.cliente_email && g.cliente_email.toLowerCase().indexOf(q) >= 0) ||
                 (g.cliente_nome && String(g.cliente_nome).toLowerCase().indexOf(q) >= 0) ||
                 (g.categoria && String(g.categoria).toLowerCase().indexOf(q) >= 0);
        });
      }

      function accessLabel(g) {
        var m = (g.access_mode || 'private').toLowerCase();
        if (m === 'password') m = 'signup';
        var self = g.allow_self_signup;
        if (m === 'public') return 'Público';
        if (self || m === 'signup') return 'Cadastro visitante';
        return 'Privado';
      }

      function render(galleries) {
        var searchQuery = (document.getElementById('search') || {}).value || '';
        var filtered = filterGalleries(galleries, searchQuery);
        var byStatus = {};
        STATUS_ORDER.forEach(function(k) { byStatus[k] = []; });
        filtered.forEach(function(g) {
          var s = (g.status || 'preparacao').toLowerCase();
          if (byStatus[s]) byStatus[s].push(g);
        });

        var html = '';
        STATUS_ORDER.forEach(function(key) {
          var label = STATUS_LABELS[key] || key;
          var list = byStatus[key] || [];
          html += '<div class="col" data-status="' + key + '">';
          html += '<div class="col-title">' + label + ' <span class="col-count">(' + list.length + ')</span></div>';
          html += '<div class="col-cards">';
          if (list.length === 0) {
            html += '<div class="empty-msg">Sem itens</div>';
          } else {
            list.forEach(function(g) {
              var selected = g.selected_count != null ? g.selected_count : 0;
              var photos = g.photos_count != null ? g.photos_count : (g.photos && g.photos.length) || 0;
              html += '<div class="card" data-gallery-id="' + g.id + '" data-status="' + key + '">';
              html += '<span class="card-trash" data-gallery-id="' + g.id + '" title="Excluir"><i class="fas fa-trash-alt"></i></span>';
              html += '<div class="card-name">' + (g.nome_projeto || 'Sem nome') + '</div>';
              html += '<div class="card-meta">slug: ' + (g.slug || '-') + '</div>';
              if (g.categoria) html += '<div class="card-meta">categoria: ' + String(g.categoria).replace(/</g, '&lt;') + '</div>';
              if (g.data_trabalho) html += '<div class="card-meta">trabalho: ' + String(g.data_trabalho) + '</div>';
              html += '<div class="card-meta">acesso: ' + accessLabel(g) + '</div>';
              var nomeC = g.cliente_nome ? String(g.cliente_nome).replace(/</g, '&lt;') : '';
              if (nomeC) html += '<div class="card-meta">nome: ' + nomeC + '</div>';
              html += '<div class="card-meta">e-mail: ' + (g.cliente_email || '-') + '</div>';
              html += '<div class="card-stats">' + selected + ' selecionadas · ' + photos + ' fotos</div>';
              html += '</div>';
            });
          }
          html += '</div></div>';
        });
        var kanban = document.getElementById('kanban');
        if (kanban) kanban.innerHTML = html;

        document.querySelectorAll('.card[data-gallery-id]').forEach(function(card) {
          card.addEventListener('click', function(e) {
            if (e.target.closest('.card-trash')) return;
            var id = card.getAttribute('data-gallery-id');
            if (id) window.open(window.location.pathname.replace('kingSelectionEdit.html', '') + '../config-finalizacao.html?galleryId=' + id + (token ? '&token=' + encodeURIComponent(token) : ''), '_blank');
          });
        });
        document.querySelectorAll('.card-trash').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var id = btn.getAttribute('data-gallery-id');
            if (id && confirm('Excluir esta galeria e todas as fotos?')) deleteGallery(id);
          });
        });
      }

      function deleteGallery(id) {
        if (!token) return;
        fetch(apiBase + '/galleries/' + id, { method: 'DELETE', headers: authHeaders() })
          .then(function(r) { if (r.ok) load(); else throw new Error('Falha ao excluir'); })
          .catch(function(e) { showErr(e.message); });
      }

      function load() {
        if (!profileItemId) {
          showErr('Informe itemid na URL (ex: ?itemid=2242).');
          return;
        }
        if (!token) {
          showErr('Token não encontrado. Abra pelo painel ou informe ?token=... na URL.');
          return;
        }
        showErr('');
        fetch(apiBase + '/galleries?profileItemId=' + encodeURIComponent(profileItemId), { headers: authHeaders() })
          .then(function(r) { return r.json().then(function(data) { if (!r.ok) throw new Error(data.message || 'Erro ' + r.status); return data; }); })
          .then(function(data) {
            var list = data.galleries || [];
            window._lastGalleries = list;
            render(list);
          })
          .catch(function(e) { showErr(e.message || 'Erro ao carregar galerias.'); });
      }

      document.getElementById('search').addEventListener('input', function() {
        if (window._lastGalleries) render(window._lastGalleries);
      });
      document.getElementById('search').addEventListener('keyup', function() {
        if (window._lastGalleries) render(window._lastGalleries);
      });

      function formatTodayBR() {
        var d = new Date();
        var dd = String(d.getDate()).padStart(2, '0');
        var mm = String(d.getMonth() + 1).padStart(2, '0');
        var yyyy = d.getFullYear();
        return dd + '/' + mm + '/' + yyyy + ' (gravada no servidor ao criar)';
      }

      function setAccessUi() {
        var sel = document.getElementById('ng_access_type');
        var wrap = document.getElementById('ng_cred_wrap');
        var em = document.getElementById('ng_cliente_email');
        var pw = document.getElementById('ng_senha');
        var hint = document.getElementById('ng_access_hint');
        if (!sel || !wrap) return;
        var v = sel.value;
        if (v === 'private') {
          wrap.style.display = '';
          em.required = true;
          pw.required = true;
          hint.textContent = 'Somente quem tiver e-mail e senha acessa a seleção.';
        } else {
          wrap.style.display = 'none';
          em.required = false;
          pw.required = false;
          em.value = '';
          pw.value = '';
          hint.textContent = v === 'public'
            ? 'Qualquer pessoa com o link vê a galeria pública; não é necessário cadastro.'
            : 'Visitantes criam o próprio acesso na tela de login da galeria.';
        }
      }

      (function modalNova() {
        var overlay = document.getElementById('modalNova');
        var form = document.getElementById('formNovaGaleria');
        var dataEl = document.getElementById('ng_data_trabalho');
        var btnCancel = document.getElementById('ng_cancel');
        var accessSel = document.getElementById('ng_access_type');
        document.getElementById('btnVoltar').addEventListener('click', function(e) {
          e.preventDefault();
          if (window.history.length > 1) window.history.back();
          else window.close();
        });
        document.getElementById('btnNova').addEventListener('click', function(e) {
          e.preventDefault();
          if (!profileItemId || !token) {
            showErr(!token ? 'Faça login ou informe token na URL.' : 'Informe itemid na URL.');
            return;
          }
          if (dataEl) dataEl.textContent = formatTodayBR();
          if (form) form.reset();
          if (document.getElementById('ng_watermark')) document.getElementById('ng_watermark').checked = true;
          if (document.getElementById('ng_limite')) document.getElementById('ng_limite').value = '0';
          if (document.getElementById('ng_min_sel')) document.getElementById('ng_min_sel').value = '0';
          if (accessSel) accessSel.value = 'private';
          setAccessUi();
          overlay.classList.add('open');
          overlay.setAttribute('aria-hidden', 'false');
        });
        function fechar() {
          overlay.classList.remove('open');
          overlay.setAttribute('aria-hidden', 'true');
        }
        btnCancel.addEventListener('click', fechar);
        overlay.addEventListener('click', function(ev) { if (ev.target === overlay) fechar(); });
        if (accessSel) accessSel.addEventListener('change', setAccessUi);
        form.addEventListener('submit', function(ev) {
          ev.preventDefault();
          if (!token || !profileItemId) return;
          var fd = new FormData(form);
          var accessType = fd.get('access_type') || 'private';
          var payload = {
            profileItemId: parseInt(profileItemId, 10),
            nome_projeto: (fd.get('nome_projeto') || '').toString().trim(),
            access_type: accessType,
            categoria: (fd.get('categoria') || '').toString().trim() || undefined,
            cliente_nome: (fd.get('cliente_nome') || '').toString().trim() || undefined,
            total_fotos_contratadas: parseInt(fd.get('total_fotos_contratadas') || '0', 10) || 0,
            min_selections: parseInt(fd.get('min_selections') || '0', 10) || 0,
            use_watermark: document.getElementById('ng_watermark').checked
          };
          if (accessType === 'private') {
            payload.cliente_email = (fd.get('cliente_email') || '').toString().trim();
            payload.senha = (fd.get('senha') || '').toString();
          }
          fetch(apiBase + '/galleries', {
            method: 'POST',
            headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
            body: JSON.stringify(payload)
          })
            .then(function(r) {
              return r.json().then(function(data) {
                if (!r.ok) throw new Error(data.message || 'Erro ao criar galeria');
                return data;
              });
            })
            .then(function(data) {
              fechar();
              var msg = 'Galeria criada.';
              if (data.client_password) msg += ' Senha do cliente: ' + data.client_password;
              if (data.access_type === 'public') msg += ' Modo público — sem e-mail/senha de cliente.';
              if (data.access_type === 'signup') msg += ' Modo cadastro de visitante habilitado.';
              showErr('');
              alert(msg);
              load();
            })
            .catch(function(e) { showErr(e.message || 'Erro ao criar.'); });
        });
      })();

      load();
    })();
  </script>
</body>
</html>
