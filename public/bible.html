<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia — a redirecionar…</title>
    <script>
        (function () {
            var DEFAULT_API = 'https://conectaking-api.onrender.com';
            var api = DEFAULT_API;
            try {
                var s = localStorage.getItem('conecta_api_origin');
                if (s) api = s.replace(/\/$/, '');
            } catch (e) {}
            var search = window.location.search || '';
            try {
                if (search.indexOf('itemId=') === -1 && search.indexOf('&itemId=') === -1 && search.indexOf('id=') === -1) {
                    var sid = sessionStorage.getItem('bible_panel_item_id');
                    if (sid) search = (search ? search + '&' : '?') + 'itemId=' + encodeURIComponent(sid);
                }
            } catch (e2) {}
            window.location.replace(api + '/bible.html' + search);
        })();
    </script>
</head>
<body><p>A redirecionar…</p></body>
</html>
